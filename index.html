<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniProjetos Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="mock.js"></script>
</head>
<body data-theme="light">

    <!-- CABEÇALHO -->
    <header class="header">
        <div class="logo">
            <img src="imagens/logo_undf.png" alt="Logo UnDF" class="logo-img">
            <h1>UniProjetos Dashboard</h1>
        </div>
        <button id="themeToggle" class="theme-toggle">🌙 Modo Escuro</button>
    </header>

    <!-- CONTEÚDO PRINCIPAL -->
    <main class="dashboard-container">

        <!-- CARDS SUPERIORES -->
        <section class="stats-grid">

            <!-- VAGAS DISPONÍVEIS -->
            <div class="card stat-card" data-card="vagas">
                <h3>VAGAS DISPONÍVEIS</h3>
                <div class="stat-value" id="vagasDisponiveis">0</div>
                <p class="stat-subtitle">
                    em <strong id="qtdProjetos">0</strong> projetos cadastrados
                </p>
            </div>

            <!-- TOTAL INSCRIÇÕES -->
            <div class="card stat-card" data-card="inscritos">
                <h3>TOTAL INSCRIÇÕES</h3>
                <div class="stat-value" id="totalInscricoes">0</div>
                <p class="stat-trend" id="trendInscricoes"></p>
            </div>

            <!-- TAXA DE OCUPAÇÃO -->
            <div class="card stat-card occupation-card-split" data-card="ocupacao">
                <div class="occupation-info-left">
                    <h3>TAXA DE OCUPAÇÃO</h3>
                    <p id="taxaPercent" class="stat-value">0 %</p>
                    <!--
                    id="ocupacaoDetalhes" class="ocupacao-detalhes">
                        0&nbsp;ocupadas&nbsp;•&nbsp;0&nbsp;livres
                    </p>
                    -->
                </div>
                <div class="circle-chart-placeholder">
                    <canvas id="occupancyChart" width="120" height="120"></canvas>
                </div>
            </div>

        </section>

        <!-- BARRA DE PESQUISA E FILTROS -->
        <section class="controls-section">
            <input type="search" id="searchInput" class="search-bar" placeholder="Buscar projetos…">

            <div class="filters">
                <select id="areaSelect" class="filter-select">
                    <option value="todas">Todas as Áreas</option>
                </select>

                <select id="statusSelect" class="filter-select">
                    <option value="todos">Todos os Status</option>
                    <option value="com-vagas">Com Vagas</option>
                    <option value="esgotado">Esgotado</option>
                </select>

                <button id="clearFiltersBtn" class="clear-filters-btn">
                    Limpar filtros
                </button>
            </div>
        </section>

        <!-- TABELA E GRÁFICO -->
        <section class="main-content-grid">

            <!-- TABELA DE PROJETOS -->
            <div class="card table-card">
                <h2>Projetos</h2>
                <div class="table-responsive">
                    <table id="projectsTable" class="data-table">
                        <thead>
                            <tr>
                                <th data-field="nome">
                                    NOME DO PROJETO <span class="sort-icon">↕</span>
                                </th>
                                <th data-field="area">
                                    ÁREA TEMÁTICA <span class="sort-icon">↕</span>
                                </th>
                                <th data-field="status">
                                    STATUS <span class="sort-icon">↕</span>
                                </th>
                                <th data-field="vagas">
                                    VAGAS <span class="sort-icon">↕</span>
                                </th>
                                <th data-field="inscritos">
                                    INSCRITOS <span class="sort-icon">↕</span>
                                </th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- ATUALIZAÇÃO DADOS -->
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- GRÁFICO -->
            <div class="card chart-card">
                <h2>Vagas por Área Temática</h2>
                <div class="pie-chart-placeholder">
                    <canvas id="pieChart"></canvas>
                </div>
            </div>

        </section>
    </main>

    <!-- MODAL DE DETALHES -->
    <div id="projectModal" class="modal-overlay">
        <div class="modal-content">
            <button class="close-modal">✕</button>
            <div class="modal-header">
                <span id="modalStatus" class="badge"></span>
                <span id="modalArea" class="modal-area"></span>
                <h2 id="modalTitle" class="modal-title"></h2>
                <p id="modalDescription" class="modal-description"></p>
            </div>
        </div>
    </div>

    <!-- SCRIPTS -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="script.js"></script>
</body>
</html>
